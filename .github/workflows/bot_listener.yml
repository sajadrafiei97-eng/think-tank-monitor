name: Telegram Bot Listener

on:
  schedule:
    - cron: '*/5 * * * *'  # backup: restarts chain if it breaks
  workflow_dispatch:

concurrency:
  group: bot-listener
  cancel-in-progress: false

jobs:
  listen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Check for Telegram commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_EN: ${{ secrets.TELEGRAM_BOT_TOKEN_EN }}
          TELEGRAM_CHAT_ID_EN: ${{ secrets.TELEGRAM_CHAT_ID_EN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python tools/bot_listener.py

      - name: Save state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .tmp/bot_offset_ar.json .tmp/bot_offset_en.json config_schedule.json
          git diff --staged --quiet || (git commit -m "chore: update bot state [skip ci]" && git pull --rebase && git push)

      - name: Daily monitor trigger — fire if cron missed today
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SCHEDULE_FILE: config_schedule.json
        run: |
          python3 << 'PYEOF'
          import os, json, requests
          from datetime import datetime, timezone, timedelta

          GH_TOKEN = os.environ["GH_TOKEN"]
          REPO     = os.environ.get("GITHUB_REPOSITORY", "sajadrafiei97-eng/think-tank-monitor")
          HEADERS  = {"Authorization": f"token {GH_TOKEN}",
                      "Accept": "application/vnd.github.v3+json"}

          # Read schedule toggle
          enabled = True
          try:
              with open("config_schedule.json") as f:
                  enabled = json.load(f).get("enabled", True)
          except Exception:
              pass

          if not enabled:
              print("Daily schedule is disabled — skipping trigger check.")
              exit(0)

          now = datetime.now(timezone.utc)
          # 9am Tehran = 05:30 UTC (UTC+3:30 — Iran has no DST since 2022)
          trigger_utc = now.replace(hour=5, minute=30, second=0, microsecond=0)

          if now < trigger_utc:
              print(f"Not yet {trigger_utc.strftime('%H:%M')} UTC — skipping.")
              exit(0)

          # Check if monitor.yml already ran today (after 05:00 UTC to avoid edge cases)
          window_start = now.replace(hour=5, minute=0, second=0, microsecond=0).isoformat().replace("+00:00", "Z")
          r = requests.get(
              f"https://api.github.com/repos/{REPO}/actions/workflows/monitor.yml/runs",
              headers=HEADERS,
              params={"per_page": 5, "created": f">={window_start}"},
          ).json()
          runs = r.get("workflow_runs", [])

          active = [x for x in runs if x.get("status") in ("in_progress", "queued", "completed")]
          if active:
              print(f"Monitor already ran today ({active[0]['status']}) — no trigger needed.")
              exit(0)

          # Trigger monitor.yml as scheduled (daily) run
          resp = requests.post(
              f"https://api.github.com/repos/{REPO}/actions/workflows/monitor.yml/dispatches",
              headers=HEADERS,
              json={"ref": "main", "inputs": {"is_scheduled": "true"}},
          )
          if resp.status_code == 204:
              print("Triggered monitor.yml (daily schedule missed by cron).")
          else:
              print(f"Trigger failed: {resp.status_code} {resp.text}")
          PYEOF

      - name: Keep-alive — trigger next run in 5 min
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sleep 290
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot_listener.yml/dispatches" \
            -d '{"ref":"main"}'
