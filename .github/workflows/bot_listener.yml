name: Telegram Bot Listener

on:
  schedule:
    - cron: '*/5 * * * *'  # backup: restarts chain if it breaks
  workflow_dispatch:

jobs:
  listen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Check for Telegram commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_EN: ${{ secrets.TELEGRAM_BOT_TOKEN_EN }}
          TELEGRAM_CHAT_ID_EN: ${{ secrets.TELEGRAM_CHAT_ID_EN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python tools/bot_listener.py

      - name: Save state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .tmp/bot_offset_ar.json .tmp/bot_offset_en.json config_schedule.json
          git diff --staged --quiet || (git commit -m "chore: update bot state [skip ci]" && git pull --rebase && git push)

      - name: Keep-alive — trigger next run in 5 min
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sleep 290
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot_listener.yml/dispatches" \
            -d '{"ref":"main"}'
