name: Site Coverage Test

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to look back (default: 14)'
        default: '14'
        required: false
      system:
        description: 'System to test: arabic or english'
        default: 'arabic'
        required: false

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env << 'EOF'
          SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
          SERPAPI_KEY_EN=${{ secrets.SERPAPI_KEY_EN }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_EN=${{ secrets.TELEGRAM_BOT_TOKEN_EN }}
          TELEGRAM_CHAT_ID_EN=${{ secrets.TELEGRAM_CHAT_ID_EN }}
          EOF

      - name: Run coverage report
        env:
          COVERAGE_DAYS: ${{ github.event.inputs.days }}
        run: |
          if [ "${{ github.event.inputs.system }}" = "english" ]; then
            python tools/coverage_report.py --config config_en.yaml
          else
            python tools/coverage_report.py --config config.yaml
          fi
