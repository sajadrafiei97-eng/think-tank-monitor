name: Think Tank Monitor

on:
  schedule:
    # 9:00 AM Tehran (IRDT = UTC+4:30) → 04:30 UTC
    - cron: '30 4 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back (1-30)'
        default: '1'
        required: false
      system:
        description: 'System to run: both, arabic, english'
        default: 'both'
        required: false
      date_from:
        description: 'Custom start date YYYY-MM-DD (overrides days)'
        default: ''
        required: false
      date_to:
        description: 'Custom end date YYYY-MM-DD'
        default: ''
        required: false

jobs:
  # Job 1: read config_schedule.json and decide if scheduled run should proceed
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            ENABLED=$(python -c "import json; d=json.load(open('config_schedule.json')); print(str(d.get('enabled',True)).lower())")
            echo "should_run=$ENABLED" >> $GITHUB_OUTPUT
          fi

  # Job 2: run the monitor (only if should_run is true)
  monitor:
    needs: check
    if: ${{ needs.check.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env << 'EOF'
          SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          SERPAPI_KEY_EN=${{ secrets.SERPAPI_KEY_EN }}
          TELEGRAM_BOT_TOKEN_EN=${{ secrets.TELEGRAM_BOT_TOKEN_EN }}
          TELEGRAM_CHAT_ID_EN=${{ secrets.TELEGRAM_CHAT_ID_EN }}
          EOF

      - name: Create .tmp directory
        run: mkdir -p .tmp

      - name: Validate and set run parameters
        id: params
        env:
          INPUT_DAYS: ${{ github.event.inputs.days }}
          INPUT_DATE_FROM: ${{ github.event.inputs.date_from }}
          INPUT_DATE_TO: ${{ github.event.inputs.date_to }}
        run: |
          # Validate days: must be a positive integer 1-30
          if [[ "$INPUT_DAYS" =~ ^[0-9]+$ ]] && [ "$INPUT_DAYS" -ge 1 ] && [ "$INPUT_DAYS" -le 30 ]; then
            DAYS="$INPUT_DAYS"
          else
            DAYS="1"
          fi
          echo "days=$DAYS" >> $GITHUB_OUTPUT

          # Validate date_from and date_to: must match YYYY-MM-DD exactly
          DATE_FROM=""
          DATE_TO=""
          if [[ "$INPUT_DATE_FROM" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] && \
             [[ "$INPUT_DATE_TO"   =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            DATE_FROM="$INPUT_DATE_FROM"
            DATE_TO="$INPUT_DATE_TO"
          fi
          echo "date_from=$DATE_FROM" >> $GITHUB_OUTPUT
          echo "date_to=$DATE_TO"     >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "extra=--no-dedup" >> $GITHUB_OUTPUT
          else
            echo "extra=" >> $GITHUB_OUTPUT
          fi

      - name: Run Arabic monitor
        if: ${{ github.event_name == 'schedule' || github.event.inputs.system != 'english' }}
        env:
          DAYS: ${{ steps.params.outputs.days }}
          DATE_FROM: ${{ steps.params.outputs.date_from }}
          DATE_TO: ${{ steps.params.outputs.date_to }}
          EXTRA: ${{ steps.params.outputs.extra }}
        run: |
          ARGS="--config config.yaml --days $DAYS $EXTRA"
          [ -n "$DATE_FROM" ] && ARGS="$ARGS --date-from $DATE_FROM --date-to $DATE_TO"
          python tools/main.py $ARGS

      - name: Run English monitor
        if: ${{ github.event_name == 'schedule' || github.event.inputs.system != 'arabic' }}
        env:
          DAYS: ${{ steps.params.outputs.days }}
          DATE_FROM: ${{ steps.params.outputs.date_from }}
          DATE_TO: ${{ steps.params.outputs.date_to }}
          EXTRA: ${{ steps.params.outputs.extra }}
        run: |
          ARGS="--config config_en.yaml --days $DAYS $EXTRA"
          [ -n "$DATE_FROM" ] && ARGS="$ARGS --date-from $DATE_FROM --date-to $DATE_TO"
          python tools/main.py $ARGS

      - name: Save state back to repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .tmp/seen_urls.json .tmp/seen_urls_en.json
          git diff --staged --quiet || (git commit -m "chore: update seen URLs [skip ci]" && git pull --rebase && git push)

      - name: Watchdog — restart bot listener if stopped + weekly health report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_EN: ${{ secrets.TELEGRAM_BOT_TOKEN_EN }}
          TELEGRAM_CHAT_ID_EN: ${{ secrets.TELEGRAM_CHAT_ID_EN }}
        run: |
          python3 << 'PYEOF'
          import os, requests
          from datetime import datetime, timezone, timedelta

          GH_TOKEN = os.environ["GH_TOKEN"]
          REPO     = os.environ.get("GITHUB_REPOSITORY", "sajadrafiei97-eng/think-tank-monitor")
          HEADERS  = {"Authorization": f"token {GH_TOKEN}",
                      "Accept": "application/vnd.github.v3+json"}
          BOTS = [
              (os.environ["TELEGRAM_BOT_TOKEN"],    os.environ["TELEGRAM_CHAT_ID"]),
              (os.environ["TELEGRAM_BOT_TOKEN_EN"], os.environ["TELEGRAM_CHAT_ID_EN"]),
          ]

          def tg(token, chat_id, text):
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage",
                            json={"chat_id": chat_id, "text": text}, timeout=10)

          # --- Check bot_listener status ---
          r = requests.get(
              f"https://api.github.com/repos/{REPO}/actions/workflows/bot_listener.yml/runs",
              headers=HEADERS, params={"per_page": 1}
          ).json()
          runs = r.get("workflow_runs", [])

          need_restart = True
          if runs:
              latest   = runs[0]
              status   = latest.get("status", "")
              if status in ("in_progress", "queued"):
                  need_restart = False
              elif status == "completed":
                  # Don't restart if it finished in the last 8 min (still in sleep window)
                  updated = latest.get("updated_at", "")
                  if updated:
                      t = datetime.fromisoformat(updated.replace("Z", "+00:00"))
                      if (datetime.now(timezone.utc) - t) < timedelta(minutes=8):
                          need_restart = False

          if need_restart:
              requests.post(
                  f"https://api.github.com/repos/{REPO}/actions/workflows/bot_listener.yml/dispatches",
                  headers=HEADERS, json={"ref": "main"}
              )
              msg = "⚠️ ربات polling متوقف بود — خودکار restart شد."
              for tok, cid in BOTS:
                  tg(tok, cid, msg)
              print(msg)
          else:
              print(f"Bot listener OK (status: {runs[0]['status'] if runs else 'unknown'})")

          # --- Weekly health report (Sundays) ---
          if datetime.now(timezone.utc).weekday() == 6 and not need_restart:
              msg = "📊 گزارش هفتگی: سیستم پایش اندیشکده سالم است. ✅"
              for tok, cid in BOTS:
                  tg(tok, cid, msg)
              print("Weekly health report sent.")
          PYEOF
